<!DOCTYPE html>
<html>
<head>
  <title>Sahas Support Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #e5ddd5;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat {
      height: 78vh;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 10px;
      max-width: 75%;
      font-size: 14px;
      position: relative;
    }

    .user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background: white;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      color: gray;
      margin-top: 3px;
      text-align: right;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 15px;
      border: none;
      border-radius: 50%;
      background: #075e54;
      color: white;
      cursor: pointer;
    }

    .typing {
      font-style: italic;
      color: gray;
    }
  </style>
</head>

<body>

<div class="header">
  🤖 Sahas Support
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type your message..." />
  <button onclick="send()">➤</button>
</div>

<script>
function timeNow() {
  return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg " + type;

  div.innerHTML = `
    ${text}
    <div class="time">${timeNow()}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // typing indicator
  let typing = document.createElement("div");
  typing.className = "msg bot typing";
  typing.innerText = "Typing...";
  document.getElementById("chat").appendChild(typing);

  try {
    let res = await fetch(`/ask?query=${encodeURIComponent(text)}`);
    let data = await res.json();

    typing.remove();
    addMessage(data.reply, "bot");

  } catch {
    typing.remove();
    addMessage("Server error ❌", "bot");
  }
}

// enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

// welcome
addMessage("Hi 👋\nI’m Sahas Support Bot.\nHow can I help you today?", "bot");
</script>
<div style="
  text-align:center;
  font-size:12px;
  color:#999;
  padding:12px;
  border-top:1px solid #ddd;
  background:#f9f9f9;
">
  🤖 Sahas Support Chatbot <br>
  Developed by Mr. Divya Mohan Verma
</div>
</body>
</html>
