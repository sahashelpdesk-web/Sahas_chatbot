<!DOCTYPE html>
<html>
<head>
  <title>Sahas Support Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #e5ddd5;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat {
      height: 75vh;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 10px;
      max-width: 75%;
      font-size: 14px;
    }

    .user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background: white;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      color: gray;
      margin-top: 3px;
      text-align: right;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 15px;
      border: none;
      border-radius: 50%;
      background: #075e54;
      color: white;
      cursor: pointer;
    }

    .typing {
      font-style: italic;
      color: gray;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 10px;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
    }

    .support-btn {
      display: inline-block;
      padding: 8px 12px;
      background: #075e54;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="header">
  🤖 Sahas Support
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type your message..." />
  <button onclick="send()">➤</button>
</div>

<div class="footer">
  🤖 Sahas Support Chatbot <br>
  Developed by Mr. Divya Mohan Verma
</div>

<script>
function timeNow() {
  return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg " + type;

  div.innerHTML = `
    ${text}
    <div class="time">${timeNow()}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔥 SUPPORT TEMPLATE FUNCTION
function showSupport() {
  let msg = `
  <style>
    .wa-btn {
      display: inline-block;
      background-color: #25D366;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      margin-top: 6px;
    }
    .wa-btn:hover {
      background-color: #1ebe5d;
    }
  </style>

  Hmm 🤔 I couldn’t find an exact answer to your question.<br><br>

  👉 You can try rephrasing it in a simpler way.<br><br>

  💡 <b>Examples:</b><br>
  • Employee not showing in salary bill<br>
  • PFMS file mismatch issue<br><br>

  📧 <b>Need more help?</b><br>
  <a href='mailto:sahas@aiims.edu?subject=Sahas Support Query&body=Hi Team,' target='_blank'>
  📩 Email Support</a><br><br>

  📱 <b>Or contact directly on WhatsApp:</b><br><br>

  <b>HR</b><br>
  <a class='wa-btn' href='https://api.whatsapp.com/send?phone=918800155902&text=Hi%20Pawan%20Sir,%20I%20have%20an%20HR%20query' target='_blank'>
  💬 Chat on WhatsApp</a><br><br>

  <b>Paybill</b><br>
  <a class='wa-btn' href='https://api.whatsapp.com/send?phone=918840021359&text=Hi%20Sir,%20I%20have%20a%20Paybill%20query' target='_blank'>
  💬 Chat on WhatsApp</a><br><br>

  <b>FMS</b><br>
  <a class='wa-btn' href='https://api.whatsapp.com/send?phone=919917670730&text=Hi%20Sir,%20I%20have%20an%20FMS%20query' target='_blank'>
  💬 Chat on WhatsApp</a><br><br>

  Our team will assist you shortly 😊
  `;

  addMessage(msg, "bot");
}  

async function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "msg bot typing";
  typing.innerText = "Typing...";
  document.getElementById("chat").appendChild(typing);

  try {
    let res = await fetch(`/ask?query=${encodeURIComponent(text)}`);
    let data = await res.json();

    typing.remove();

    // 🔥 Inject Contact Support button automatically
    let reply = data.reply.replace(
      "Contact Support",
      `<a href="#" onclick="showSupport()" class="support-btn">Contact Support</a>`
    );

    addMessage(reply, "bot");

  } catch {
    typing.remove();
    addMessage("Server error ❌", "bot");
  }
}

// enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

// welcome
addMessage("Hi 👋<br>I’m Sahas Support Bot.<br>How can I help you today?", "bot");
</script>

</body>
</html>
